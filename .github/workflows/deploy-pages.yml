name: 🚀 Deploy → GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Build (base=/FILEHUB-IA/)
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://xlbtwjxyphqnjeugfxds.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || '' }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY || '' }}
          VITE_WA_SERVER_URL: ${{ secrets.VITE_WA_SERVER_URL || 'https://whatsapp-filehub-production.up.railway.app' }}
          VITE_WA_WS_URL: ${{ secrets.VITE_WA_WS_URL || 'wss://whatsapp-filehub-production.up.railway.app/ws' }}
        run: npx vite build --base=/FILEHUB-IA/

      - name: Copiar index → 404 (SPA routing)
        run: cp dist/index.html dist/404.html

      - name: Deploy a rama gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
          commit_message: "🚀 Auto-deploy [skip ci] — ${{ github.sha }}"
