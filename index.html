  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f8fafc;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }

    /* ═══ MOBILE RESPONSIVE FIXES ═══ */
    @media (max-width: 768px) {
      /* Prevent horizontal overflow */
      html, body { overflow-x: hidden; max-width: 100vw; }
      
      /* Fix sidebar width on mobile */
      .sidebar-container { width: 280px !important; max-width: 85vw !important; }
      
      /* Smaller padding on mobile */
      .p-6 { padding: 1rem !important; }
      .p-8 { padding: 1.25rem !important; }
      .rounded-\[2rem\] { border-radius: 1rem !important; }
      .rounded-\[3rem\] { border-radius: 1.25rem !important; }
      
      /* Weekly agenda — 7 cols is tight, allow scroll */
      .grid-cols-7 { gap: 0.25rem !important; }
      .grid-cols-7 > * { min-width: 0; font-size: 0.6rem !important; }
      
      /* Stats cards — 2 cols on small screens */
      .grid-cols-4 { grid-template-columns: repeat(2, 1fr) !important; }
      
      /* Fix charts overflowing */
      .recharts-wrapper { max-width: 100% !important; }
      
      /* Fix modals */
      .fixed.inset-0 .max-w-lg { max-width: 95vw !important; margin: 0.5rem !important; }
      
      /* Bottom safe area for iOS */
      main { padding-bottom: env(safe-area-inset-bottom, 20px) !important; }
    }

    /* ═══ SMALL PHONES (iPhone SE, etc) ═══ */
    @media (max-width: 375px) {
      .text-3xl { font-size: 1.5rem !important; }
      .text-2xl { font-size: 1.25rem !important; }
      .text-xl { font-size: 1.1rem !important; }
      .gap-6 { gap: 0.75rem !important; }
    }

    /* ═══ CARPLAY MODE ═══ */
    @media (display-mode: standalone) and (max-height: 480px),
           (max-height: 400px) {
      /* CarPlay has landscape ~800x480 or smaller */
      .sidebar-container { display: none !important; }
      header { padding: 0.25rem 0.5rem !important; }
      .text-3xl, .text-2xl { font-size: 1rem !important; }
      .grid-cols-7 { display: none !important; }
      .rounded-2xl { border-radius: 0.5rem !important; }
      .p-5, .p-6, .p-8 { padding: 0.5rem !important; }
      .gap-6, .gap-4 { gap: 0.25rem !important; }
      .mb-8, .mb-12 { margin-bottom: 0.25rem !important; }
      /* Show only essential info */
      .recharts-wrapper { display: none !important; }
    }

    /* ═══ TABLET ═══ */
    @media (min-width: 768px) and (max-width: 1024px) {
      .lg\:col-span-8 { grid-column: span 12 !important; }
      .lg\:col-span-4 { grid-column: span 12 !important; }
    }

    /* ═══ PWA Standalone — no browser UI ═══ */
    @media (display-mode: standalone) {
      body { padding-top: env(safe-area-inset-top, 0); }
      /* iOS PWA: ensure inputs work properly */
      input, textarea, select {
        -webkit-appearance: none;
        -webkit-user-select: text !important;
        user-select: text !important;
        touch-action: manipulation;
        font-size: 16px !important;
      }
    }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    button, nav { user-select: none; }
    input, textarea, select { user-select: text; -webkit-user-select: text; }

    /* Offline banner */
    #offline-banner {
      display: none;
      position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
      background: #f59e0b; color: #1c1917; text-align: center;
      padding: 8px 16px; font-size: 12px; font-weight: 700;
      font-family: 'Inter', sans-serif;
    }
    #offline-banner.show { display: block; }

<body class="bg-[#f8fafc]">
  <!-- Offline indicator -->
  <div id="offline-banner">⚡ Sin conexión — FileHub funciona offline con tus datos guardados</div>

  <div id="root"></div>

  <script>
    // Catch Supabase auth errors globally to prevent white screen
    window.addEventListener('error', function(e) {
      if (e.message && (e.message.includes("reading 'user'") || e.message.includes("reading 'session'") || e.message.includes("reading 'email'") || e.message.includes("reading 'id'"))) {
        e.preventDefault();
        console.warn('⚠️ Auth session not ready yet — suppressed error');
      }
    });
    window.addEventListener('unhandledrejection', function(e) {
      if (e.reason?.message && (e.reason.message.includes('user') || e.reason.message.includes('session') || e.reason.message.includes('ENOTFOUND') || e.reason.message.includes('Failed to fetch'))) {
        e.preventDefault();
      }
    });
  </script>

  <script>
    // Offline detection
    function updateOnlineStatus() {
      const banner = document.getElementById('offline-banner');
      if (!navigator.onLine) banner.classList.add('show');
      else banner.classList.remove('show');
    }
    window.addEventListener('online', updateOnlineStatus);
    window.addEventListener('offline', updateOnlineStatus);
    updateOnlineStatus();

    // Service Worker — Force update for iOS PWA
    const SW_EXPECTED_VERSION = 'filehub-v29';
    if ('serviceWorker' in navigator) {
      // Nuke old SWs on iOS standalone
      const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
      const lastSWVersion = localStorage.getItem('filehub_sw_version');
      
      if (lastSWVersion && lastSWVersion !== SW_EXPECTED_VERSION) {
        console.log('[SW] Old version detected, nuking caches...');
        caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k)))).then(() => {
          navigator.serviceWorker.getRegistrations().then(regs => {
            regs.forEach(r => r.unregister());
            localStorage.setItem('filehub_sw_version', SW_EXPECTED_VERSION);
            if (isStandalone) window.location.reload();
          });
        });
      } else {
        localStorage.setItem('filehub_sw_version', SW_EXPECTED_VERSION);
      }

      window.addEventListener('load', async () => {
        const swBase = location.pathname.startsWith('/FILEHUB-IA') ? '/FILEHUB-IA' : '';
        try {
          const reg = await navigator.serviceWorker.register(swBase + '/sw.js', { scope: swBase + '/' });
          console.log('[SW] Registered:', reg.scope);
          // Force check for updates on every load in standalone mode
          if (isStandalone) reg.update();

          reg.addEventListener('updatefound', () => {
            const newWorker = reg.installing;
            if (newWorker) {
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  newWorker.postMessage({ type: 'SKIP_WAITING' });
                }
              });
            }
          });

          // Listen for SW_UPDATED message → reload to get fresh content
          navigator.serviceWorker.addEventListener('message', event => {
            if (event.data?.type === 'SW_UPDATED') {
              console.log('[App] New SW active, reloading...');
              window.location.reload();
            }
          });

          // Also reload when controller changes (SW took over)
          let refreshing = false;
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (!refreshing) {
              refreshing = true;
              window.location.reload();
            }
          });

        } catch (err) {
          console.warn('[SW] Registration failed:', err);
        }
      });
    }
  </script>
